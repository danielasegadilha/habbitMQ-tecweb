version: "3.3"

services:
  mysql:
    container_name: swm-mysql
    restart: always
    image: mysql:8.0
    networks:
      - swmnetwork
    ports:
      - "3307:3307"
    volumes:
      - ./volumes/mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: senha
      MYSQL_DATABASE: danielasegadilha # Opcional: cria um banco de dados inicial
      MYSQL_USER: root # Opcional: cria um usuário específico
      MYSQL_PASSWORD: senha # Opcional: senha para o usuário específico

  rabbit:
    container_name: swm-rabbit
    restart: always
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./volumes/rabbit:/data
    networks:
      - swmnetwork

networks:
  swmnetwork:  # Definição da rede swmnetwork
    driver: bridge